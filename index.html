<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>你的名字 · 个人主页</title>
  <meta name="description" content="个人简介与项目展示">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">你的名字</h1>
      <nav class="nav">
        <a href="#about">关于</a>
        <a href="#projects">项目</a>
        <a href="#contact">联系</a>
        <button id="themeToggle" aria-label="切换主题">🌙</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero container">
      <img class="avatar" src="https://via.placeholder.com/160" alt="头像占位">
      <div>
        <h2>你好，我是 <strong>你的名字</strong></h2>
        <p class="lead">前端 / 后端 / 全栈 开发者 — 在构建简单且美观的网页时充满热情。</p>
        <p class="links">
          <a class="btn" href="#projects">查看项目</a>
          <a class="btn ghost" href="#contact">联系我</a>
        </p>
        <p class="social">
          <a href="#">GitHub</a> · <a href="#">Twitter</a> · <a href="#">Email</a>
        </p>
      </div>
    </section>

    <section id="about" class="container card">
      <h3>关于我</h3>
      <p>这里写一段简短的自我介绍，列出技能、兴趣以及你想展示的核心信息。</p>
    </section>

    <section id="projects" class="container">
      <h3>项目</h3>
      <div class="grid">
        <article class="project">
          <h4>项目一</h4>
          <p>项目一的简短描述。可放置链接、演示或仓库地址。</p>
          <p><a class="link" href="#">查看详情 →</a></p>
        </article>
        <article class="project">
          <h4>项目二</h4>
          <p>项目二的简短描述。</p>
          <p><a class="link" href="#">查看详情 →</a></p>
        </article>
      </div>
    </section>

    <section id="contact" class="container card">
      <h3>联系</h3>
      <p>你可以通过电子邮件或社交媒体联系我。</p>
      <p>Email: <a href="mailto:your@email.com">your@email.com</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">© 2025 你的名字 · 基于模板构建</div>
  </footer>

  <script src="js/scripts.js"></script>
</body>
</html>
